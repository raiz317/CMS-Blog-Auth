services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - "5000-5005:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/cms_db
    depends_on:
      - mongodb

  frontend:
    image: nginx:alpine
    ports:
      - "8080-8085:80"
    volumes:
      - ./admin:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  mongo-data:
